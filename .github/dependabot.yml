---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: "05:00"
      timezone: Etc/UTC
    commit-message:
      prefix: ci
    open-pull-requests-limit: 10

  - package-ecosystem: docker
    directory: /build
    schedule:
      interval: weekly
      day: friday
      time: "05:00"
      timezone: Etc/UTC
    commit-message:
      prefix: build
