---
name: build

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions: {}

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build x86-64
        run: build/build.sh x86-64 "ci.${GITHUB_RUN_NUMBER}"

      - name: Smoke test
        run: build/smoke.sh "$(ls tools-*.raw)"
