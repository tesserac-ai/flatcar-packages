---
name: build

on:
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build x86-64
        run: build/build.sh x86-64 "ci.${GITHUB_RUN_NUMBER}"

      - name: Smoke test
        run: build/smoke.sh "$(ls tools-*.raw)"
