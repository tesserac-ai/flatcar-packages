# Debian compiles its site startup into emacs' startup.elc, which reads this
# directory at launch and errors if it is missing. Create it (empty); the
# bundle ships no Debian add-on packages. The Butane example creates it too, so
# provisioning does not depend on tmpfiles ordering at boot.
d /etc/emacs 0755 root root -
d /etc/emacs/site-start.d 0755 root root -
